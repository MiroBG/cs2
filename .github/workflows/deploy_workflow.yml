name: deploy_workflow

on:
  pull_request:
    paths:
      - "main/**"
      - "terraform/**"
      - "bootstrap/**"
      - ".github/workflows/deploy_workflow.yml"
      - ".github/workflows/destroy_workflow.yml"
  push:
    branches:
      - main
    paths:
      - "main/**"
      - "terraform/**"
      - "bootstrap/**"
      - ".github/workflows/deploy_workflow.yml"
      - ".github/workflows/destroy_workflow.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-main
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  TF_IN_AUTOMATION: "true"

jobs:
  check:
    name: Fmt + Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt (check)
        run: terraform fmt -recursive -check

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  apply:
    name: Plan + Apply (main)
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required backend secrets
        run: |
          test -n "${{ secrets.AWS_ROLE_TO_ASSUME || secrets.AWS_ROLE_ARN || vars.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_ARN }}" || (echo "Missing role input: set AWS_ROLE_TO_ASSUME (or AWS_ROLE_ARN) in Secrets or Variables" && exit 1)
          test -n "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}" || (echo "Missing backend bucket: set TF_BACKEND_BUCKET in Secrets or Variables" && exit 1)
          test -n "${{ secrets.TF_LOCK_TABLE || vars.TF_LOCK_TABLE }}" || (echo "Missing lock table: set TF_LOCK_TABLE in Secrets or Variables" && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || secrets.AWS_ROLE_ARN || vars.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate backend.hcl
        run: |
          cat > backend.hcl <<EOF
          bucket         = "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}"
          key            = "cs1/terraform.tfstate"
          region         = "${{ env.AWS_REGION }}"
          encrypt        = true
          dynamodb_table = "${{ secrets.TF_LOCK_TABLE || vars.TF_LOCK_TABLE }}"
          EOF

      - name: Terraform init
        run: terraform init -reconfigure -backend-config=backend.hcl

      - name: Terraform plan
        run: terraform plan -out=tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan
