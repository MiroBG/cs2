name: destroy_workflow

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  TF_IN_AUTOMATION: "true"

jobs:
  destroy:
    name: Terraform Destroy (manual)
    if: github.event.inputs.confirm_destroy == 'DESTROY'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.AWS_ROLE_TO_ASSUME || secrets.AWS_ROLE_ARN || vars.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_ARN }}" || (echo "Missing role input: set AWS_ROLE_TO_ASSUME (or AWS_ROLE_ARN) in Secrets or Variables" && exit 1)
          test -n "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}" || (echo "Missing backend bucket: set TF_BACKEND_BUCKET in Secrets or Variables" && exit 1)
          test -n "${{ secrets.TF_LOCK_TABLE || vars.TF_LOCK_TABLE }}" || (echo "Missing lock table: set TF_LOCK_TABLE in Secrets or Variables" && exit 1)

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || secrets.AWS_ROLE_ARN || vars.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_ARN }}
          role-session-name: github-actions-destroy
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate backend.hcl
        run: |
          cat > backend.hcl <<EOF
          bucket         = "${{ secrets.TF_BACKEND_BUCKET || vars.TF_BACKEND_BUCKET }}"
          key            = "cs1/terraform.tfstate"
          region         = "${{ env.AWS_REGION }}"
          encrypt        = true
          dynamodb_table = "${{ secrets.TF_LOCK_TABLE || vars.TF_LOCK_TABLE }}"
          EOF

      - name: Terraform init
        run: terraform init -reconfigure -backend-config=backend.hcl

      - name: Set Terraform variable overrides
        run: |
          ADMIN_CIDR="${{ secrets.ADMIN_INGRESS_CIDR || vars.ADMIN_INGRESS_CIDR }}"
          if [[ -n "$ADMIN_CIDR" ]]; then
            echo "TF_VAR_ssh_ingress_cidr=$ADMIN_CIDR" >> "$GITHUB_ENV"
            echo "Using ADMIN_INGRESS_CIDR from GitHub Secrets/Variables"
          else
            echo "ADMIN_INGRESS_CIDR not set; Terraform default for ssh_ingress_cidr will be used"
          fi

      - name: Terraform destroy
        run: terraform destroy -auto-approve

  destroy_rejected:
    name: Destroy rejected (missing confirmation)
    if: github.event.inputs.confirm_destroy != 'DESTROY'
    runs-on: ubuntu-latest
    steps:
      - name: Fail if not confirmed
        run: |
          echo "Destroy not confirmed. Re-run workflow and set confirm_destroy to DESTROY."
          exit 1
