name: destroy_workflow

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  TF_IN_AUTOMATION: "true"

jobs:
  destroy:
    name: Terraform Destroy (manual)
    if: github.event.inputs.confirm_destroy == 'DESTROY'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-destroy
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.AWS_ROLE_TO_ASSUME }}" || (echo "Missing secret: AWS_ROLE_TO_ASSUME" && exit 1)
          test -n "${{ secrets.TF_BACKEND_BUCKET }}" || (echo "Missing secret: TF_BACKEND_BUCKET" && exit 1)
          test -n "${{ secrets.TF_LOCK_TABLE }}" || (echo "Missing secret: TF_LOCK_TABLE" && exit 1)

      - name: Generate backend.hcl
        run: |
          cat > backend.hcl <<EOF
          bucket         = "${{ secrets.TF_BACKEND_BUCKET }}"
          key            = "cs1/terraform.tfstate"
          region         = "${{ env.AWS_REGION }}"
          encrypt        = true
          dynamodb_table = "${{ secrets.TF_LOCK_TABLE }}"
          EOF

      - name: Terraform init
        run: terraform init -reconfigure -backend-config=backend.hcl

      - name: Terraform destroy
        run: terraform destroy -auto-approve

  destroy_rejected:
    name: Destroy rejected (missing confirmation)
    if: github.event.inputs.confirm_destroy != 'DESTROY'
    runs-on: ubuntu-latest
    steps:
      - name: Fail if not confirmed
        run: |
          echo "Destroy not confirmed. Re-run workflow and set confirm_destroy to DESTROY."
          exit 1
